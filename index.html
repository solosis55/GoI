<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        function normTheme(r) {
          if (r === "legacy" || r === "encendido" || r === "healthy" || r === "neon") return r;
          if (r === "dark") return "legacy";
          if (r === "light") return "encendido";
          return null;
        }
        try {
          var raw =
            localStorage.getItem("goi:theme") || localStorage.getItem("fitsocial:theme");
          var t = normTheme(raw);
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: light)").matches ? "encendido" : "legacy";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "legacy");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
